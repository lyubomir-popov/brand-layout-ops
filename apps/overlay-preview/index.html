<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#202020">
  <title>Brand Layout Ops Preview</title>
</head>
<body class="is-dark" style="background:#202020;">
  <button class="p-button is-dense drawer-toggle" type="button" data-drawer-toggle aria-expanded="false" aria-controls="control-drawer">Controls</button>
  <button class="drawer-backdrop" type="button" data-drawer-backdrop aria-label="Close controls"></button>
  <div class="l-application mascot-app is-dark">
    <main class="l-main">
      <div class="p-panel">
        <div class="p-panel__content viewer-panel__content">
          <section class="stage" data-stage aria-label="Animated halo field">
            <canvas data-stage-canvas aria-hidden="true"></canvas>
            <canvas class="stage__text-overlay" data-text-overlay aria-hidden="true"></canvas>
            <svg class="stage__svg-overlay" data-svg-overlay aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></svg>
            <div class="stage__authoring-layer" data-authoring-layer></div>
          </section>
        </div>
      </div>
    </main>

    <aside class="l-aside is-collapsed" id="control-drawer" data-control-panel aria-label="Animation controls">
      <div class="p-panel drawer-panel">
        <div class="p-panel__header is-sticky">
          <h1 class="p-panel__title">Brand Layout Ops</h1>
          <div class="p-panel__controls">
            <button class="p-button--base is-dense" type="button" data-drawer-close>Close</button>
          </div>
        </div>
        <div class="p-panel__content drawer-panel__content">
          <div class="u-fixed-width drawer-content">
            <div class="preset-panel-content" data-preset-panel>
              <div class="main-actions">
                <h2 class="p-muted-heading u-no-margin--bottom">Playback And Export</h2>
                <div class="row">
                  <div class="col-2">
                    <button class="p-button is-dense" type="button" data-playback-toggle>Pause Motion</button>
                  </div>
                  <div class="col-2">
                    <button class="p-button--base is-dense" type="button" data-export-frame-button>Export Frame</button>
                  </div>
                  <div class="col-2">
                    <button class="p-button--base is-dense" type="button" data-reset-button>Reset Defaults</button>
                  </div>
                  <div class="col-2">
                    <button class="p-button--base is-dense" type="button" data-write-source-default>Write Source Default</button>
                  </div>
                </div>
                <p class="p-form-help-text u-no-margin--bottom" data-source-default-status>
                  Source defaults are using the built-in preview snapshot.
                </p>
                <div class="p-form__group">
                  <label class="p-form__label u-no-margin--bottom" for="export-transparent-background">
                    Transparent PNG background
                  </label>
                  <div class="p-form__control">
                    <input id="export-transparent-background" type="checkbox" data-export-transparent-background>
                  </div>
                </div>
                <div class="p-form__group">
                  <label class="p-form__label u-no-margin--bottom" for="show-overlay-visibility">
                    Show overlay
                  </label>
                  <div class="p-form__control">
                    <input id="show-overlay-visibility" type="checkbox" data-overlay-visibility>
                  </div>
                </div>
              </div>

              <div class="output-profile-panel">
                <div class="preset-section-header">
                  <h2 class="p-muted-heading u-no-margin--bottom">Output Format</h2>
                  <p class="p-form-help-text u-no-margin--bottom">
                    Switching format rebuilds the stage at that size and swaps in the layout settings stored for that screen size.
                  </p>
                </div>
                <div class="preset-selection">
                  <div class="preset-options" data-output-profile-options></div>
                </div>
              </div>

              <div class="preset-panel-section">
                <div class="preset-section-header">
                  <h2 class="p-muted-heading u-no-margin--bottom">Presets</h2>
                  <p class="p-form-help-text u-no-margin--bottom">Presets are stored in this browser.</p>
                </div>
                <div class="preset-toolbar">
                  <button class="p-button is-dense" type="button" data-preset-save>Save</button>
                  <button class="p-button--base is-dense" type="button" data-preset-update>Update</button>
                  <button class="p-button--base is-dense" type="button" data-preset-import>Import</button>
                  <button class="p-button--base is-dense" type="button" data-preset-export>Export</button>
                  <button class="p-button--base is-dense" type="button" data-preset-delete>Delete</button>
                </div>
                <input type="file" data-preset-import-input accept="application/json,.json" hidden>
                <div class="preset-selection">
                  <div class="preset-options" data-preset-tabs></div>
                </div>
              </div>
            </div>
            <div class="config-sections" data-config-editor></div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
