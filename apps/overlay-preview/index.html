<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#202020">
  <title>Brand Layout Ops Preview</title>
</head>
<body class="bf-theme is-dark">
  <div class="bf-application has-navigation" data-aside-resize-storage-key="brand-layout-ops-control-panel-width-v1">
    <header id="authoring-top-navigation" class="bf-top-navigation is-sticky is-authoring-top-navigation">
      <div class="bf-fixed-width">
        <div class="bf-top-navigation-row">
          <div class="bf-top-navigation-banner">
            <div class="bf-top-navigation-logo">
              <span class="bf-top-navigation-link is-authoring-top-navigation-brand">
                <span class="bf-top-navigation-logo-tag" aria-hidden="true">BL</span>
                <span class="bf-top-navigation-logo-title">Brand Layout Ops</span>
              </span>
            </div>
            <ul class="bf-top-navigation-list is-banner-actions" aria-label="Authoring menu toggle">
              <li class="bf-top-navigation-item">
                <button class="bf-top-navigation-menu-toggle" type="button">Menu</button>
              </li>
            </ul>
          </div>

          <nav class="bf-top-navigation-nav" aria-label="Authoring actions">
            <ul class="bf-top-navigation-list">
              <li class="bf-top-navigation-item is-dropdown-toggle">
                <button class="bf-top-navigation-link bf-top-navigation-dropdown-toggle" type="button">File</button>
                <ul class="bf-top-navigation-dropdown" aria-hidden="true" data-file-menu></ul>
              </li>
              <li class="bf-top-navigation-item is-dropdown-toggle">
                <button class="bf-top-navigation-link bf-top-navigation-dropdown-toggle" type="button">Document</button>
                <ul class="bf-top-navigation-dropdown" aria-hidden="true" data-document-menu></ul>
              </li>
              <li class="bf-top-navigation-item is-dropdown-toggle">
                <button class="bf-top-navigation-link bf-top-navigation-dropdown-toggle" type="button">Defaults</button>
                <ul class="bf-top-navigation-dropdown" aria-hidden="true" data-source-default-menu></ul>
              </li>
              <li class="bf-top-navigation-item is-dropdown-toggle">
                <button class="bf-top-navigation-link bf-top-navigation-dropdown-toggle" type="button">Export</button>
                <ul class="bf-top-navigation-dropdown" aria-hidden="true" data-export-menu></ul>
              </li>
              <li class="bf-top-navigation-item is-dropdown-toggle">
                <button class="bf-top-navigation-link bf-top-navigation-dropdown-toggle" type="button">Motion</button>
                <ul class="bf-top-navigation-dropdown" aria-hidden="true" data-playback-menu></ul>
              </li>
            </ul>

            <ul class="bf-top-navigation-list" aria-label="Workspace panels">
              <li class="bf-top-navigation-item is-right-shifted">
                <button class="bf-top-navigation-link" type="button" data-control-panel-toggle aria-controls="control-drawer" aria-expanded="false">Parameters</button>
              </li>
            </ul>
          </nav>
        </div>
      </div>
      <div class="bf-top-navigation-search-overlay" aria-hidden="true"></div>
    </header>

    <main class="bf-main">
      <div class="bf-fixed-width bf-stage-shell">
        <section class="is-stage" data-stage aria-label="Animated halo field">
          <canvas data-stage-canvas aria-hidden="true"></canvas>
          <canvas class="is-scene-preview" data-scene-preview aria-hidden="true"></canvas>
          <canvas class="is-scene-preview-gpu" data-scene-preview-gpu aria-hidden="true"></canvas>
          <canvas class="is-text-overlay" data-text-overlay aria-hidden="true"></canvas>
          <svg data-svg-overlay aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></svg>
          <div class="is-authoring-layer" data-authoring-layer></div>
        </section>
      </div>
    </main>

    <div class="bf-application-overlay" data-panel-drawer-close aria-controls="control-drawer" aria-hidden="true"></div>

    <aside class="bf-aside is-overlay is-medium" id="control-drawer" data-control-panel aria-label="Animation controls" aria-hidden="true">
      <div
        class="bf-application-aside-resize-handle"
        data-control-panel-resize-handle
        role="separator"
        tabindex="0"
        aria-controls="control-drawer"
        aria-label="Resize control panel"
        aria-orientation="vertical"
      ></div>
      <div class="bf-panel is-fill">
        <div class="bf-panel-header is-sticky">
          <h2 class="bf-panel-title">Parameters</h2>
          <div class="bf-panel-controls">
            <button class="bf-panel-toggle" type="button" data-panel-drawer-close data-panel-drawer-autofocus aria-controls="control-drawer">Close</button>
          </div>
        </div>
        <div class="bf-panel-content bf-grid-scope">
          <div class="bf-stack is-compact-stack" data-config-editor></div>
        </div>
      </div>
    </aside>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
