<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#202020">
  <title>Brand Layout Ops Preview</title>
</head>
<body class="bf-theme is-dark">
  <div class="bf-application has-navigation" data-aside-resize-storage-key="brand-layout-ops-control-panel-width-v1">
    <div class="bf-navigation-bar is-authoring-navigation">
      <section class="bf-panel is-fill">
        <div class="bf-panel-header">
          <div class="bf-stack is-flush">
            <h1 class="bf-panel-title">Brand Layout Ops</h1>
            <p class="bf-form-help is-tight">File, document, defaults, export, and playback actions now live in the top shell chrome.</p>
          </div>
          <div class="is-authoring-nav-actions">
            <div class="is-authoring-nav-group">
              <span class="is-authoring-nav-group-label">File</span>
              <nav class="bf-actions is-nowrap" aria-label="File actions" data-file-toolbar></nav>
            </div>
            <div class="is-authoring-nav-group">
              <span class="is-authoring-nav-group-label">Document</span>
              <nav class="bf-actions is-nowrap" aria-label="Document size actions" data-document-toolbar></nav>
            </div>
            <div class="is-authoring-nav-group">
              <span class="is-authoring-nav-group-label">Defaults</span>
              <nav class="bf-actions is-nowrap" aria-label="Source default actions" data-source-default-toolbar></nav>
            </div>
            <div class="is-authoring-nav-group">
              <span class="is-authoring-nav-group-label">Export</span>
              <nav class="bf-actions is-nowrap" aria-label="Export actions" data-export-toolbar></nav>
            </div>
            <div class="is-authoring-nav-group">
              <span class="is-authoring-nav-group-label">Motion</span>
              <nav class="bf-actions is-nowrap" aria-label="Playback actions" data-playback-toolbar></nav>
            </div>
            <div class="is-authoring-nav-group">
              <span class="is-authoring-nav-group-label">Panel</span>
              <div class="bf-actions is-nowrap">
                <button class="bf-button is-base is-dense" type="button" data-control-panel-toggle data-panel-drawer-toggle aria-controls="control-drawer" aria-expanded="false">Parameters</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <main class="bf-main">
      <div class="bf-fixed-width bf-stage-shell">
        <section class="is-stage" data-stage aria-label="Animated halo field">
          <canvas data-stage-canvas aria-hidden="true"></canvas>
          <canvas class="is-scene-preview" data-scene-preview aria-hidden="true"></canvas>
          <canvas class="is-scene-preview-gpu" data-scene-preview-gpu aria-hidden="true"></canvas>
          <canvas class="is-text-overlay" data-text-overlay aria-hidden="true"></canvas>
          <svg data-svg-overlay aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></svg>
          <div class="is-authoring-layer" data-authoring-layer></div>
        </section>
      </div>
    </main>

    <div class="bf-application-overlay" data-panel-drawer-close aria-controls="control-drawer" aria-hidden="true"></div>

    <aside class="bf-aside is-overlay is-medium" id="control-drawer" data-control-panel aria-label="Animation controls" aria-hidden="true">
      <div
        class="bf-application-aside-resize-handle"
        data-control-panel-resize-handle
        role="separator"
        tabindex="0"
        aria-controls="control-drawer"
        aria-label="Resize control panel"
        aria-orientation="vertical"
      ></div>
      <div class="bf-panel is-fill">
        <div class="bf-panel-header is-sticky">
          <h2 class="bf-panel-title">Parameters</h2>
          <div class="bf-panel-controls">
            <button class="bf-panel-toggle" type="button" data-panel-drawer-close data-panel-drawer-autofocus aria-controls="control-drawer">Close</button>
          </div>
        </div>
        <div class="bf-panel-content bf-grid-scope">
          <div class="bf-stack is-compact-stack" data-config-editor></div>
        </div>
      </div>
    </aside>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
