<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#202020">
  <title>Brand Layout Ops Preview</title>
</head>
<body class="vr-theme is-dark">
  <button class="p-button is-dense drawer-toggle" type="button" data-drawer-toggle aria-expanded="false" aria-controls="control-drawer">Controls</button>
  <button class="drawer-backdrop" type="button" data-drawer-backdrop aria-label="Close controls"></button>
  <div class="l-application mascot-app is-dark">
    <main class="l-main">
      <div class="u-fixed-width viewer-panel__content">
        <section class="stage" data-stage aria-label="Animated halo field">
          <canvas data-stage-canvas aria-hidden="true"></canvas>
          <canvas class="stage__text-overlay" data-text-overlay aria-hidden="true"></canvas>
          <svg class="stage__svg-overlay" data-svg-overlay aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></svg>
          <div class="stage__authoring-layer" data-authoring-layer></div>
        </section>
      </div>
    </main>

    <aside class="l-aside is-collapsed" id="control-drawer" data-control-panel aria-label="Animation controls">
      <div class="p-panel drawer-panel">
        <div class="p-panel__header is-sticky">
          <h1 class="p-panel__title">Brand Layout Ops</h1>
          <div class="p-panel__controls">
            <button class="p-button--base is-dense" type="button" data-drawer-close>Close</button>
          </div>
        </div>
        <div class="p-panel__content">
          <div class="u-fixed-width">
            <div class="config-sections" data-config-editor></div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
