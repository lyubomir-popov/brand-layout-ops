<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#202020">
  <title>Brand Layout Ops Preview</title>
</head>
<body class="bf-theme" data-bf-tone="dark">
  <button class="drawer-backdrop" type="button" data-drawer-backdrop aria-label="Close controls"></button>
  <div class="bf-application mascot-app" data-bf-tone="dark">
    <main class="bf-main">
      <div class="bf-fixed-width bf-stage-shell">
        <section class="stage" data-stage aria-label="Animated halo field">
          <canvas data-stage-canvas aria-hidden="true"></canvas>
          <canvas class="stage__text-overlay" data-text-overlay aria-hidden="true"></canvas>
          <svg class="stage__svg-overlay" data-svg-overlay aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></svg>
          <div class="stage__authoring-layer" data-authoring-layer></div>
        </section>
      </div>
    </main>

    <aside class="bf-aside" id="control-drawer" data-control-panel aria-label="Animation controls">
      <div
        class="bf-application__aside-resize-handle"
        data-control-panel-resize-handle
        role="separator"
        tabindex="0"
        aria-controls="control-drawer"
        aria-label="Resize control panel"
        aria-orientation="vertical"
      ></div>
      <div class="bf-panel is-fill">
        <div class="bf-panel__header is-sticky">
          <h1 class="bf-panel__title">Brand Layout Ops</h1>
          <div class="bf-panel__controls">
            <button class="bf-button--base is-dense" type="button" data-drawer-close>Close</button>
          </div>
        </div>
        <div class="bf-panel__content">
          <div class="bf-stack preview-stack--compact" data-config-editor></div>
        </div>
      </div>
    </aside>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
